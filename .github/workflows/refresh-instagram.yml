name: Refresh Instagram Posts

on:
  schedule:
    # Every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch latest posts from Instagram Graph API
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
        run: |
          curl -sf \
            "https://graph.instagram.com/me/media?fields=id,caption,media_url,thumbnail_url,media_type,timestamp,permalink&limit=6&access_token=${INSTAGRAM_ACCESS_TOKEN}" \
            -o public/instagram-posts.json || echo '{"data":[]}' > public/instagram-posts.json

      - name: Commit if posts changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/instagram-posts.json
          git diff --staged --quiet && echo "No changes" || (git commit -m "chore: refresh Instagram posts" && git push)
